services:
  - type: web
    name: plotter-service
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan storage:link
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: OKDESK_API_TOKEN
        sync: false
      - key: OKDESK_ACCOUNT
        value: insitech
      - key: OKDESK_STATUS_CODE
        value: Equipment_transferred_repair_VSP

databases:
  - name: plotter-db
    plan: free
    databaseName: plotter
    user: plotter_user