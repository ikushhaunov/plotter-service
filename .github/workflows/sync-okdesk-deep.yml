name: Sync Okdesk Deep Search

on:
  workflow_dispatch:

jobs:
  deep-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Deep sync 2000 issues
        run: |
          echo "Начинаем глубокую синхронизацию..."
          
          # Цикл: проверяем 2000 заявок (100 запросов по 20 заявок)
          # Начинаем с ID 456350 и идем вниз
          CURRENT_ID=456350
          
          for i in {1..100}; do
            echo "=== Запрос $i: проверяем от ID $CURRENT_ID ==="
            curl -s -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=20&start-id=$CURRENT_ID"
            echo ""
            
            # Уменьшаем ID на 20
            CURRENT_ID=$((CURRENT_ID - 20))
            
            # Пауза 3 секунды между запросами
            sleep 3
          done
          
          echo "=== Готово! Проверено 2000 заявок ==="