name: Sync Okdesk Full Import

on:
  workflow_dispatch:

jobs:
  sync-batch-1:
    runs-on: ubuntu-latest
    steps:
      - name: Sync first 100
        run: |
          curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100" -H "Accept: application/json"
      - name: Wait 5 seconds
        run: sleep 5

  sync-batch-2:
    runs-on: ubuntu-latest
    needs: sync-batch-1
    steps:
      - name: Sync second 100
        run: |
          curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100" -H "Accept: application/json"
      - name: Wait 5 seconds
        run: sleep 5

  sync-batch-3:
    runs-on: ubuntu-latest
    needs: sync-batch-2
    steps:
      - name: Sync third 100
        run: |
          curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100" -H "Accept: application/json"
      - name: Wait 5 seconds
        run: sleep 5

  sync-batch-4:
    runs-on: ubuntu-latest
    needs: sync-batch-3
    steps:
      - name: Sync fourth 100
        run: |
          curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100" -H "Accept: application/json"
      - name: Wait 5 seconds
        run: sleep 5

  sync-batch-5:
    runs-on: ubuntu-latest
    needs: sync-batch-4
    steps:
      - name: Sync fifth 100
        run: |
          curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100" -H "Accept: application/json"