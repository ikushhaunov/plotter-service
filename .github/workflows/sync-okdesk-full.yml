name: Sync Okdesk Deep Import

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: 'С какого ID начинать проверку (оставьте пустым для начала с конца)'
        required: false
        default: ''

jobs:
  sync-batch-1:
    runs-on: ubuntu-latest
    steps:
      - name: Sync batch 1
        run: |
          if [ -n "${{ github.event.inputs.start_id }}" ]; then
            curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100&start-id=${{ github.event.inputs.start_id }}"
          else
            curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100"
          fi

  sync-batch-2:
    runs-on: ubuntu-latest
    needs: sync-batch-1
    steps:
      - name: Sync batch 2
        run: |
          # Вычисляем следующий ID (примерно -100 от предыдущего)
          # Для простоты просто запускаем еще раз, скрипт сам продолжит если мы передадим start-id
          # Но так как мы не можем передать динамический ID между джобами без артефактов,
          # мы просто запустим 5 раз с фиксированным шагом, если start_id задан.
          
          # ВНИМАНИЕ: Это упрощенная версия. Для точного шага лучше использовать браузер.
          curl -X GET "https://plotter-service.onrender.com/sync-okdesk?limit=100"